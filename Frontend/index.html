<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <a href="user.html">Go to user management</a>
        <div class="header">
            Register form
        </div>
        <div class="flex form-input">
            <div class="header-form">Firstname</div>
            <input class="form" name="firstname" type="text">
        </div>
        <div class="flex form-input">
            <div class="header-form">Lastname</div>
            <input class="form" name="lastname" type="text">
        </div>
        <div class="flex form-input">
            <div class="header-form">Age</div> 
            <input class="form" name="age" type="number" min="0" max="100">
        </div>
        <div class="flex gender form-input">
            <div class="header-form">Gender</div> 
            <div class="flex">
                <div>
                    <input name="gender" type="radio" value="male"> male
                </div>
                <div>
                    <input name="gender" type="radio" value="female"> female
                </div>
                <div>
                    <input name="gender" type="radio" value="others"> others
                </div>
            </div>
        </div>
        <div class="form-input">
                Description
            <textarea name="description"></textarea>
        </div>
        <div id="message" class="message">
            
        </div>
        <div class="center">
            <button onclick="submitData()" class="button">Submit</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
